<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiSearch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0b;
      --bg-secondary: #111113;
      --bg-card: #161618;
      --bg-hover: #1c1c1f;
      --border: #2a2a2d;
      --border-hover: #3a3a3d;
      --text: #ffffff;
      --text-muted: #888890;
      --text-dim: #555560;
      --accent: #0081f2;
      --accent-glow: rgba(0, 129, 242, 0.4);
      --accent-soft: rgba(0, 129, 242, 0.1);
      --google: #4285f4;
      --yandex: #ff3d00;
      --bing: #00a4ef;
      --success: #00c853;
      --transition-fast: 0.15s ease;
      --transition-med: 0.25s ease;
      --shadow-glow: 0 0 20px var(--accent-glow), 0 0 40px rgba(0, 129, 242, 0.2);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    .bg-grid {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(rgba(0, 129, 242, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 129, 242, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, rgba(0, 129, 242, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Clock */
    .clock {
      position: fixed;
      top: 2rem;
      right: 2rem;
      text-align: right;
      z-index: 10;
      padding: 1.25rem 1.5rem;
      background: linear-gradient(145deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--accent);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 0 20px var(--accent-glow), inset 0 0 30px rgba(0, 129, 242, 0.05);
    }

    .clock:hover {
      border-color: var(--accent);
      box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(0, 129, 242, 0.2), inset 0 0 30px rgba(0, 129, 242, 0.1);
      transform: scale(1.02);
    }

    .clock-time {
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 50%, #00c8ff 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      line-height: 1;
    }

    .clock-time .clock-seconds {
      font-size: 1.2rem;
      opacity: 0.5;
      font-weight: 400;
    }

    .clock-date {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .clock-greeting {
      color: var(--accent);
      font-size: 0.75rem;
      margin-top: 0.4rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* Weather */
    .weather {
      position: fixed;
      top: 2rem;
      left: 2rem;
      text-align: left;
      z-index: 10;
      padding: 1.25rem 1.5rem;
      background: linear-gradient(145deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--accent);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      box-shadow: 0 0 20px var(--accent-glow), inset 0 0 30px rgba(0, 129, 242, 0.05);
    }

    .weather:hover {
      border-color: var(--accent);
      box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(0, 129, 242, 0.2), inset 0 0 30px rgba(0, 129, 242, 0.1);
      transform: scale(1.02);
    }

    .weather-temp {
      font-size: 2.8rem;
      font-weight: 300;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 50%, #00c8ff 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      line-height: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .weather-icon {
      font-size: 2rem;
    }

    .weather-desc {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      font-weight: 500;
      text-transform: capitalize;
    }

    .weather-location {
      color: var(--accent);
      font-size: 0.75rem;
      margin-top: 0.4rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* Logo */
    .logo {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -1px;
      margin-bottom: 3rem;
      position: relative;
    }

    .logo span {
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 50%, #00c8ff 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      text-shadow: 0 0 40px var(--accent-glow);
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .logo::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), #00c8ff, var(--accent), transparent);
      background-size: 200% 100%;
      animation: lineShift 3s ease infinite;
      box-shadow: 0 0 15px var(--accent);
    }

    @keyframes lineShift {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 0%; }
    }

    /* Search Container */
    .search-container {
      width: 100%;
      max-width: 700px;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 6px;
      transition: var(--transition-med);
      box-shadow: 0 0 20px var(--accent-glow), inset 0 0 30px rgba(0, 129, 242, 0.05);
    }

    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(0, 129, 242, 0.2), inset 0 0 30px rgba(0, 129, 242, 0.1);
    }

    .search-box::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 17px;
      padding: 1px;
      background: linear-gradient(135deg, var(--accent), transparent, var(--accent));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.5;
      transition: var(--transition-med);
    }

    .search-box:focus-within::before {
      opacity: 1;
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 1rem 1.5rem;
      font-size: 1.1rem;
      color: var(--text);
      outline: none;
    }

    .search-input::placeholder {
      color: var(--text-dim);
    }

    /* Glowing Button */
    .btn-glow {
      position: relative;
      background: var(--accent);
      border: none;
      padding: 1rem 2rem;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition-med);
      overflow: hidden;
    }

    .btn-glow::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      opacity: 0;
      transition: var(--transition-fast);
    }

    .btn-glow:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .btn-glow:hover::before {
      opacity: 1;
    }

    .btn-glow:active {
      transform: translateY(0);
    }

    /* Engine Options */
    .engine-options {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .engine-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: var(--transition-med);
      user-select: none;
    }

    .engine-option:hover {
      border-color: var(--border-hover);
      background: var(--bg-hover);
    }

    .engine-option.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      box-shadow: 0 0 15px rgba(0, 129, 242, 0.2);
    }

    .engine-option input { display: none; }

    .engine-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid currentColor;
      transition: var(--transition-fast);
    }

    .engine-option.active .engine-dot {
      background: currentColor;
      box-shadow: 0 0 8px currentColor;
    }

    .engine-option.google { color: var(--google); }
    .engine-option.yandex { color: var(--yandex); }
    .engine-option.bing { color: var(--bing); }

    .engine-label {
      color: var(--text);
      font-size: 0.9rem;
    }

    /* Mode Toggle */
    .mode-toggle {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      justify-content: center;
    }

    .mode-btn {
      position: relative;
      padding: 0.8rem 1.8rem;
      background: var(--bg-card);
      border: 1px solid var(--accent);
      color: var(--text-muted);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-size: 0.9rem;
      font-weight: 500;
      overflow: hidden;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .mode-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .mode-btn:hover {
      color: var(--text);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .mode-btn:hover::before {
      opacity: 1;
    }

    .mode-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 25px var(--accent-glow), inset 0 0 20px rgba(0, 129, 242, 0.1);
    }

    .mode-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    /* Results Container */
    .results-container {
      display: none;
      width: 100%;
      max-width: 1600px;
      margin-top: 2rem;
      gap: 1rem;
      animation: slideUp 0.4s ease;
    }

    .results-container.active {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-frame {
      background: var(--bg-card);
      border: 1px solid var(--accent);
      border-radius: 16px;
      overflow: hidden;
      height: 75vh;
      min-height: 500px;
      transition: var(--transition-med);
      box-shadow: 0 0 20px var(--accent-glow), inset 0 0 30px rgba(0, 129, 242, 0.03);
    }

    .result-frame:hover {
      border-color: var(--accent);
      box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(0, 129, 242, 0.15);
    }

    .frame-header {
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .frame-title {
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .frame-title::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 8px currentColor;
    }

    .frame-header.google .frame-title { color: var(--google); }
    .frame-header.yandex .frame-title { color: var(--yandex); }
    .frame-header.bing .frame-title { color: var(--bing); }

    .frame-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      transition: var(--transition-fast);
    }

    .frame-link:hover {
      color: var(--text);
      background: var(--bg-hover);
    }

    .result-frame iframe {
      width: 100%;
      height: calc(100% - 50px);
      border: none;
      background: #fff;
    }

    /* Quick Links */
    .quick-links {
      display: flex;
      gap: 1rem;
      margin-top: 3rem;
      flex-wrap: wrap;
      justify-content: center;
      perspective: 1000px;
    }

    .quick-link {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.2rem 1.6rem;
      background: linear-gradient(145deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
      border: 1px solid var(--accent);
      border-radius: 16px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      min-width: 90px;
      box-shadow: 0 0 15px var(--accent-glow), inset 0 0 20px rgba(0, 129, 242, 0.03);
    }

    .quick-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .quick-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 40%;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      transition: width 0.3s ease;
    }

    .quick-link:hover {
      color: var(--text);
      border-color: var(--accent);
      transform: translateY(-6px) scale(1.02);
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.4),
        0 0 40px var(--accent-glow),
        inset 0 0 30px rgba(0, 129, 242, 0.1);
    }

    .quick-link:hover::before {
      opacity: 1;
    }

    .quick-link:hover::after {
      width: 80%;
    }

    .quick-link svg {
      position: relative;
      z-index: 1;
      width: 24px;
      height: 24px;
      transition: all 0.3s ease;
      filter: drop-shadow(0 0 0 transparent);
    }

    .quick-link:hover svg {
      color: var(--accent);
      transform: scale(1.15);
      filter: drop-shadow(0 0 8px var(--accent-glow));
    }

    .quick-link span {
      position: relative;
      z-index: 1;
    }

    .quick-link:active {
      transform: translateY(-2px) scale(0.98);
    }

    /* Keyboard hint */
    .keyboard-hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text-dim);
      font-size: 0.8rem;
      display: flex;
      gap: 1rem;
    }

    kbd {
      background: var(--bg-card);
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 0.75rem;
    }

    /* Pulse animation for active states */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
      50% { box-shadow: 0 0 0 8px transparent; }
    }

    /* Close button for results */
    .close-results {
      position: fixed;
      top: 2rem;
      left: 2rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 44px;
      height: 44px;
      border-radius: 12px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: var(--transition-med);
      z-index: 100;
    }

    .close-results:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--shadow-glow);
    }

    .close-results.show {
      display: flex;
    }

    @media (max-width: 768px) {
      .clock { display: none; }
      .logo { font-size: 2rem; }
      .results-container.active {
        grid-template-columns: 1fr;
      }
      .result-frame {
        height: 60vh;
      }
      .keyboard-hint { display: none; }
    }

    /* Force fully opaque dark background and cards */
    html, body {
      background-color: #050509;
    }

    .clock,
    .search-box,
    .quick-link,
    .mode-btn {
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <button class="close-results" id="closeResults" title="Back to search">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </button>

  <div class="clock">
    <div class="clock-time" id="clockTime">00:00<span class="clock-seconds">:00</span></div>
    <div class="clock-date" id="clockDate"></div>
    <div class="clock-greeting" id="clockGreeting"></div>
  </div>

  <div class="weather" id="weather">
    <div class="weather-temp"><span class="weather-icon">☀️</span><span id="weatherTemp">--°</span></div>
    <div class="weather-desc" id="weatherDesc">Loading...</div>
    <div class="weather-location">Los Angeles, CA</div>
  </div>

  <div class="container">
    <h1 class="logo"><span>MultiSearch</span></h1>

    <div class="search-container" id="searchContainer">
      <form class="search-box" id="searchForm">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search the web..."
          autofocus
          autocomplete="off"
        >
        <button type="submit" class="btn-glow">Search</button>
      </form>

      <div class="engine-options">
        <label class="engine-option google active">
          <input type="checkbox" name="engine" value="google" checked>
          <span class="engine-dot"></span>
          <span class="engine-label">Google</span>
        </label>
        <label class="engine-option yandex active">
          <input type="checkbox" name="engine" value="yandex" checked>
          <span class="engine-dot"></span>
          <span class="engine-label">Yandex</span>
        </label>
        <label class="engine-option bing active">
          <input type="checkbox" name="engine" value="bing" checked>
          <span class="engine-dot"></span>
          <span class="engine-label">Bing</span>
        </label>
      </div>

    </div>

    <div class="results-container" id="resultsContainer"></div>

    <div class="quick-links" id="quickLinks">
      <a href="https://www.icloud.com/mail" class="quick-link" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        <span>iCloud</span>

  <div class="keyboard-hint">
    <span>Press <kbd>Enter</kbd> to search</span>
    <span><kbd>Esc</kbd> to go back</span>
  </div>

  <script>
    const engines = {
      google: {
        name: 'Google',
        url: 'https://www.google.com/search?igu=1&q=',
        direct: 'https://www.google.com/search?q='
      },
      yandex: {
        name: 'Yandex',
        url: 'https://yandex.com/search/?text=',
        direct: 'https://yandex.com/search/?text='
      },
      bing: {
        name: 'Bing',
        url: 'https://www.bing.com/search?q=',
        direct: 'https://www.bing.com/search?q='
      }
    };

    let searchMode = 'tabs';

    // Clock
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');

      document.getElementById('clockTime').innerHTML =
        `${hours}:${minutes}<span class="clock-seconds">:${seconds}</span>`;

      document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', {
        weekday: 'long',
        month: 'short',
        day: 'numeric'
      });

      // Dynamic greeting
      const hour = now.getHours();
      let greeting = 'Good evening';
      if (hour < 12) greeting = 'Good morning';
      else if (hour < 17) greeting = 'Good afternoon';

      document.getElementById('clockGreeting').textContent = greeting;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Weather for Los Angeles
    const weatherIcons = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
      45: '🌫️', 48: '🌫️',
      51: '🌧️', 53: '🌧️', 55: '🌧️',
      61: '🌧️', 63: '🌧️', 65: '🌧️',
      71: '🌨️', 73: '🌨️', 75: '🌨️',
      80: '🌦️', 81: '🌦️', 82: '🌦️',
      95: '⛈️', 96: '⛈️', 99: '⛈️'
    };

    const weatherDesc = {
      0: 'Clear sky', 1: 'Mostly clear', 2: 'Partly cloudy', 3: 'Overcast',
      45: 'Foggy', 48: 'Foggy',
      51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle',
      61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
      71: 'Light snow', 73: 'Snow', 75: 'Heavy snow',
      80: 'Light showers', 81: 'Showers', 82: 'Heavy showers',
      95: 'Thunderstorm', 96: 'Thunderstorm', 99: 'Severe thunderstorm'
    };

    async function updateWeather() {
      try {
        // Los Angeles coordinates: 34.0522, -118.2437
        const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=34.0522&longitude=-118.2437&current=temperature_2m,weather_code&temperature_unit=fahrenheit');
        const data = await res.json();
        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weather_code;

        document.getElementById('weatherTemp').textContent = temp + '°F';
        document.querySelector('.weather-icon').textContent = weatherIcons[code] || '🌡️';
        document.getElementById('weatherDesc').textContent = weatherDesc[code] || 'Unknown';
      } catch (e) {
        document.getElementById('weatherDesc').textContent = 'Weather unavailable';
      }
    }
    updateWeather();
    setInterval(updateWeather, 600000); // Update every 10 minutes

    // Engine toggle
    document.querySelectorAll('.engine-option').forEach(option => {
      option.addEventListener('click', () => {
        const checkbox = option.querySelector('input');
        checkbox.checked = !checkbox.checked;
        option.classList.toggle('active', checkbox.checked);
      });
    });

    // Search
    document.getElementById('searchForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;

      const selectedEngines = [];
      document.querySelectorAll('.engine-option input:checked').forEach(cb => {
        selectedEngines.push(cb.value);
      });

      if (selectedEngines.length === 0) {
        alert('Select at least one search engine');
        return;
      }

      const encodedQuery = encodeURIComponent(query);

      if (searchMode === 'tabs') {
        selectedEngines.forEach((engine, i) => {
          setTimeout(() => window.open(engines[engine].direct + encodedQuery, '_blank'), i * 100);
        });
      } else {
        showSplitView(selectedEngines, encodedQuery);
      }
    });

    function showSplitView(selectedEngines, query) {
      const container = document.getElementById('resultsContainer');
      const searchContainer = document.getElementById('searchContainer');
      const quickLinks = document.getElementById('quickLinks');
      const closeBtn = document.getElementById('closeResults');

      container.innerHTML = '';
      container.classList.add('active');
      searchContainer.style.display = 'none';
      quickLinks.style.display = 'none';
      closeBtn.classList.add('show');

      selectedEngines.forEach(engine => {
        const frame = document.createElement('div');
        frame.className = 'result-frame';
        frame.innerHTML = `
          <div class="frame-header ${engine}">
            <span class="frame-title">${engines[engine].name}</span>
            <a href="${engines[engine].direct}${query}" target="_blank" class="frame-link">Open in new tab</a>
          </div>
          <iframe src="${engines[engine].url}${query}" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
        `;
        container.appendChild(frame);
      });
    }

    function hideResults() {
      document.getElementById('resultsContainer').classList.remove('active');
      document.getElementById('searchContainer').style.display = 'block';
      document.getElementById('quickLinks').style.display = 'flex';
      document.getElementById('closeResults').classList.remove('show');
      document.getElementById('searchInput').focus();
    }

    document.getElementById('closeResults').addEventListener('click', hideResults);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideResults();
    });

    document.getElementById('searchInput').focus();
  </script>
